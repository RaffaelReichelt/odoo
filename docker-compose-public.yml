# docker-compose-public.yml
# Docker Swarm Stack: Odoo mit öffentlichem Internetzugriff + Tailscale-ERP-Sidecar
#
# Zugriffsmodell:
#   Internet → Traefik → Odoo   (Website, Shop, Kundenportal, Anmeldung, Assets)
#   Internet → Traefik → 403    (/odoo ERP-Backend, /web/database Datenbankmanager)
#   ERP-Nutzer → Tailscale-Sidecar → Odoo  (vollständiger Zugriff über Tailnet)
#
# Voraussetzungen:
#   docker secret create odoo_conf /path/to/odoo.conf
#   export TS_AUTHKEY=tskey-auth-...
#   export DOMAIN=erp.beispiel.de
#   export TS_HOSTNAME=privatemind-erp        # optionaler Tailscale-Hostname
#
# Deployment:
#   docker stack deploy -c docker-compose-public.yml odoo

services:

  # ─── Tailscale-Sidecar ────────────────────────────────────────────────────
  # Stellt ERP-Nutzern den vollen Odoo-Zugriff über das Tailnet bereit.
  # Erreichbar als: https://<TS_HOSTNAME>.<tailnet>.ts.net
  tailscale-odoo:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-privatemind-erp}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY?Variable not set}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true            # kein /dev/net/tun erforderlich
      - TS_SERVE_CONFIG=/etc/tailscale/serve.json
    volumes:
      - tailscale-odoo-state:/var/lib/tailscale
      - ./tailscale/serve.json:/etc/tailscale/serve.json:ro
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      labels:
        - traefik.enable=false
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s

  # ─── Odoo ─────────────────────────────────────────────────────────────────
  # Erreichbar über Traefik (öffentliche Pfade) und Tailscale-Sidecar (ERP).
  # ODOO_LIST_DB=False verhindert die DB-Auswahl aus dem Internet.
  odoo:
    image: privatemind/odoo:18.0
    secrets:
      - odoo_conf
    environment:
      - ODOO_ADDONS_PATH=/usr/src/odoo/community/addons,/home/odoo/addons/18.0,/usr/src/odoo/reporting-engine,/usr/src/odoo/OCA/web,/usr/src/odoo/svn_orbitpdf-18,/usr/src/odoo/theme_liquid_glass,/home/odoo/extra-addons
      - ODOO_DB_PORT=5432
      - ODOO_DB_USER=odoo
      - ODOO_DB_NAME=odoo
      - ODOO_DATA_DIR=/usr/src/odoo/data
      - ODOO_LIST_DB=False           # Sicherheit: keine DB-Auswahl aus dem Internet
      - ODOO_PROXY_MODE=True         # Pflicht hinter Traefik (X-Forwarded-For)
      - ODOO_DB_MAXCONN=100
      - ODOO_MAX_CRON_THREADS=2
      - ODOO_MAX_CONNECTIONS=1000
      - ODOO_SESSION_TIMEOUT=60
      - ODOO_SESSION_GC=60
    volumes:
      - /home/raffael/Projekte/PrivateMind/odoo/addons/18.0:/home/odoo/addons/18.0
      - /home/raffael/Projekte/PrivateMind/odoo/data:/usr/src/odoo/data
      - /home/raffael/Projekte/PrivateMind/odoo/community:/usr/src/odoo/community
      - /home/raffael/Projekte/PrivateMind/odoo/web:/usr/src/odoo/OCA/web
      - /home/raffael/Projekte/PrivateMind/odoo/reporting-engine:/usr/src/odoo/reporting-engine
      - /home/raffael/Projekte/PrivateMind/odoo/theme_liquid_glass:/usr/src/odoo/theme_liquid_glass
      - /home/raffael/Projekte/PrivateMind/odoo/svn_orbitpdf-18:/usr/src/odoo/svn_orbitpdf-18
      - /home/raffael/Projekte/PrivateMind/odoo/filestore:/usr/src/odoo/data/filestore
      - /home/raffael/Projekte/PrivateMind/odoo/OCA/Subscription_Management_OCA:/home/odoo/extra-addons/Subscription_Management_OCA
    networks:
      - odoo-internal              # Verbindung zum Tailscale-Sidecar
      - postgres-odoo_postgres     # Datenbankverbindung
      - traefik_traefik-public     # Öffentlicher Internetzugriff über Traefik
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.constraint-label=traefik-public
        - traefik.docker.network=traefik_traefik-public

        # HTTP → HTTPS Weiterleitung
        - traefik.http.routers.odoo-http.rule=Host(`${DOMAIN?Value not set}`)
        - traefik.http.routers.odoo-http.entrypoints=http
        - traefik.http.routers.odoo-http.middlewares=https-redirect
        - traefik.http.routers.odoo-http.service=odoo

        # Öffentlicher HTTPS-Router (Priorität 10 — catch-all, wird von erp-block überschrieben)
        - traefik.http.routers.odoo-public.rule=Host(`${DOMAIN?Value not set}`)
        - traefik.http.routers.odoo-public.entrypoints=https
        - traefik.http.routers.odoo-public.tls=true
        - traefik.http.routers.odoo-public.priority=10
        - traefik.http.routers.odoo-public.service=odoo
        - traefik.http.services.odoo.loadbalancer.server.port=8069

        # WebSocket / Longpolling (Priorität 50 — vor catch-all, hinter erp-block)
        - traefik.http.routers.odoo-ws.rule=Host(`${DOMAIN?Value not set}`) && Path(`/bus/websocket`)
        - traefik.http.routers.odoo-ws.entrypoints=https
        - traefik.http.routers.odoo-ws.tls=true
        - traefik.http.routers.odoo-ws.priority=50
        - traefik.http.routers.odoo-ws.service=odoo-ws
        - traefik.http.services.odoo-ws.loadbalancer.server.port=8069

      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      update_config:
        order: start-first
        failure_action: rollback

  # ─── ERP-Sperrdienst ──────────────────────────────────────────────────────
  # Leichter nginx-Dienst, der für ERP- und DB-Pfade HTTP 403 zurückgibt.
  # Traefik leitet /odoo und /web/database mit höherer Priorität (100) hierher.
  # ERP-Nutzer greifen stattdessen über den Tailscale-Sidecar zu.
  deny:
    image: nginx:alpine
    configs:
      - source: nginx_deny_conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - traefik_traefik-public
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.constraint-label=traefik-public
        - traefik.docker.network=traefik_traefik-public

        # HTTP-Block (ERP-Pfade auf HTTP direkt sperren, kein Redirect)
        - traefik.http.routers.odoo-erp-block-http.rule=Host(`${DOMAIN?Value not set}`) && (PathPrefix(`/odoo`) || PathPrefix(`/web/database`))
        - traefik.http.routers.odoo-erp-block-http.entrypoints=http
        - traefik.http.routers.odoo-erp-block-http.priority=100
        - traefik.http.routers.odoo-erp-block-http.service=deny

        # HTTPS-Block (ERP-Pfade auf HTTPS sperren — höchste Priorität)
        - traefik.http.routers.odoo-erp-block.rule=Host(`${DOMAIN?Value not set}`) && (PathPrefix(`/odoo`) || PathPrefix(`/web/database`))
        - traefik.http.routers.odoo-erp-block.entrypoints=https
        - traefik.http.routers.odoo-erp-block.tls=true
        - traefik.http.routers.odoo-erp-block.priority=100
        - traefik.http.routers.odoo-erp-block.service=deny
        - traefik.http.services.deny.loadbalancer.server.port=80

      restart_policy:
        condition: on-failure
        delay: 5s

# ─── Configs ──────────────────────────────────────────────────────────────────
configs:
  nginx_deny_conf:
    file: ./nginx-deny/default.conf

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  tailscale-odoo-state:

# ─── Netzwerke ────────────────────────────────────────────────────────────────
networks:
  odoo-internal:
    driver: overlay
    attachable: true             # ermöglicht manuelle Debug-Verbindungen
  postgres-odoo_postgres:
    external: true               # vom postgres-odoo Stack verwaltet
  traefik_traefik-public:
    external: true               # vom Traefik Stack verwaltet

# ─── Secrets ──────────────────────────────────────────────────────────────────
secrets:
  odoo_conf:
    external: true
