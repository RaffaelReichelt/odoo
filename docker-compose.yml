services:
  odoo:
    image: docker.io/odoo/odoo
    secrets:
      - odoo_conf
    volumes:
      - /Users/raffael/Projekte/PrivateMind/odoo:/home/odoo
      - /Users/raffael/Projekte/PrivateMind/odoo/home:/usr/src/odoo/data
      # Ersetzt duch Docker Swarm Secret odoo_conf
      # - /Users/raffael/Projekte/PrivateMind/odoo/etc:/usr/src/odoo/etc
      - /Users/raffael/Projekte/PrivateMind/odoo/community:/usr/src/odoo/community
      - /Users/raffael/Projekte/PrivateMind/odoo/web:/usr/src/odoo/OCA/web
    networks:
      - postgres_odoo_postgres
      - traefik_traefik-public   
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"    
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
         - traefik.enable=true
         - traefik.constraint-label=traefik-public
         - traefik.docker.network=traefik_traefik-public
         - traefik.http.routers.odoo-http.rule=Host(`${DOMAIN?Value not set}`)
         - traefik.http.routers.odoo-http.entrypoints=http
         - traefik.http.routers.odoo-http.middlewares=https-redirect
         - traefik.http.routers.odoo-https.rule=Host(`${DOMAIN?Value not set}`)
         - traefik.http.routers.odoo-https.entrypoints=https
         - traefik.http.routers.odoo-https.tls=true
         - traefik.http.services.odoo.loadbalancer.server.port=8069
         # Websockets …
         - traefik.http.routers.odoo-websocket.rule=PATH(`/websocket`)
         - traefik.http.routers.odoo-websocket.entrypoints=websocket
         - traefik.http.routers.odoo-websocket.tls=true
         - traefik.http.services.odoo.loadbalancer.server.port=8072
networks:
  postgres_odoo_postgres:
    external: true
  traefik_traefik-public:
   external: true
secrets:
  odoo_conf:
    external: true