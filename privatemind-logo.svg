<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 345" width="440" height="345">
  <defs>
    <linearGradient id="shieldBg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a0535"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8b2af8"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#8b2af8"/>
    </linearGradient>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shieldGlow" x="-10%" y="-5%" width="120%" height="115%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield outer glow -->
  <path d="M220 20 L340 65 L340 160 Q340 240 220 285 Q100 240 100 160 L100 65 Z"
        fill="none" stroke="#00d4ff" stroke-width="8" opacity="0.12" filter="url(#shieldGlow)"/>

  <!-- Shield background -->
  <path d="M220 20 L340 65 L340 160 Q340 240 220 285 Q100 240 100 160 L100 65 Z"
        fill="url(#shieldBg)"/>

  <!-- Shield border -->
  <path d="M220 20 L340 65 L340 160 Q340 240 220 285 Q100 240 100 160 L100 65 Z"
        fill="none" stroke="url(#accentV)" stroke-width="2" opacity="0.85"/>

  <!--
    Nodes (label, cx, cy, r):
    A  148  95   8.0  – left,  bright cyan
    B  130 160   6.0  – left,  mid-blue
    C  158 220   7.0  – left,  purple
    D  195  68   5.0  – upper, small cyan
    E  180 120   6.5  – mid-upper, teal
    F  165 172   5.0  – mid-low, blue-purple
    G  210 208   5.5  – mid-low, purple
    H  235  90   6.5  – right-upper, cyan
    I  252 140   5.0  – right-mid
    J  218 162   5.5  – right-mid, purple-blue
    K  244 220   5.5  – right-low, purple
    L  278 100   7.5  – output, bright cyan
    M  285 158   6.0  – output mid
    N  268 212   7.0  – output low, purple
  -->

  <!-- === Connections (organic, cross-layer, varied opacity) === -->
  <!-- A connections -->
  <line x1="148" y1="95"  x2="195" y2="68"  stroke="#00d4ff" stroke-width="1.0" opacity="0.35"/>
  <line x1="148" y1="95"  x2="180" y2="120" stroke="#00ccee" stroke-width="1.1" opacity="0.42"/>
  <line x1="148" y1="95"  x2="235" y2="90"  stroke="#00bbdd" stroke-width="0.8" opacity="0.22"/>
  <line x1="148" y1="95"  x2="130" y2="160" stroke="#2255cc" stroke-width="0.7" opacity="0.18"/>
  <line x1="148" y1="95"  x2="218" y2="162" stroke="#4455ee" stroke-width="0.7" opacity="0.13"/>

  <!-- B connections -->
  <line x1="130" y1="160" x2="180" y2="120" stroke="#3377ff" stroke-width="1.0" opacity="0.30"/>
  <line x1="130" y1="160" x2="165" y2="172" stroke="#4477ff" stroke-width="1.0" opacity="0.38"/>
  <line x1="130" y1="160" x2="210" y2="208" stroke="#6644cc" stroke-width="0.8" opacity="0.22"/>
  <line x1="130" y1="160" x2="252" y2="140" stroke="#2266dd" stroke-width="0.7" opacity="0.14"/><!-- long cross -->

  <!-- C connections -->
  <line x1="158" y1="220" x2="165" y2="172" stroke="#5544dd" stroke-width="0.9" opacity="0.30"/>
  <line x1="158" y1="220" x2="210" y2="208" stroke="#7733ee" stroke-width="1.0" opacity="0.38"/>
  <line x1="158" y1="220" x2="244" y2="220" stroke="#8822ee" stroke-width="0.8" opacity="0.28"/>
  <line x1="158" y1="220" x2="268" y2="212" stroke="#8b2af8" stroke-width="0.8" opacity="0.25"/>
  <line x1="158" y1="220" x2="235" y2="90"  stroke="#5533bb" stroke-width="0.6" opacity="0.10"/><!-- dramatic cross -->

  <!-- D connections -->
  <line x1="195" y1="68"  x2="235" y2="90"  stroke="#00d4ff" stroke-width="1.0" opacity="0.38"/>
  <line x1="195" y1="68"  x2="180" y2="120" stroke="#11bbee" stroke-width="0.9" opacity="0.30"/>
  <line x1="195" y1="68"  x2="278" y2="100" stroke="#00aadd" stroke-width="0.8" opacity="0.28"/><!-- skip to output -->

  <!-- E connections -->
  <line x1="180" y1="120" x2="235" y2="90"  stroke="#00ccff" stroke-width="1.0" opacity="0.32"/>
  <line x1="180" y1="120" x2="252" y2="140" stroke="#2299ff" stroke-width="1.0" opacity="0.35"/>
  <line x1="180" y1="120" x2="218" y2="162" stroke="#4477ff" stroke-width="0.9" opacity="0.28"/>
  <line x1="180" y1="120" x2="165" y2="172" stroke="#3366ee" stroke-width="0.8" opacity="0.22"/>
  <line x1="180" y1="120" x2="278" y2="100" stroke="#1188cc" stroke-width="0.7" opacity="0.18"/><!-- skip -->

  <!-- F connections -->
  <line x1="165" y1="172" x2="218" y2="162" stroke="#5566ff" stroke-width="1.0" opacity="0.32"/>
  <line x1="165" y1="172" x2="252" y2="140" stroke="#4455ee" stroke-width="0.8" opacity="0.20"/>
  <line x1="165" y1="172" x2="285" y2="158" stroke="#6644dd" stroke-width="0.7" opacity="0.18"/><!-- skip to output -->
  <line x1="165" y1="172" x2="210" y2="208" stroke="#7733ee" stroke-width="0.9" opacity="0.25"/>

  <!-- G connections -->
  <line x1="210" y1="208" x2="218" y2="162" stroke="#8833ee" stroke-width="0.9" opacity="0.25"/>
  <line x1="210" y1="208" x2="244" y2="220" stroke="#8822ff" stroke-width="1.0" opacity="0.35"/>
  <line x1="210" y1="208" x2="285" y2="158" stroke="#7733dd" stroke-width="0.8" opacity="0.22"/>
  <line x1="210" y1="208" x2="268" y2="212" stroke="#8b2af8" stroke-width="0.9" opacity="0.30"/>
  <line x1="210" y1="208" x2="278" y2="100" stroke="#5522aa" stroke-width="0.6" opacity="0.10"/><!-- long cross -->

  <!-- H connections -->
  <line x1="235" y1="90"  x2="252" y2="140" stroke="#00bbff" stroke-width="1.0" opacity="0.30"/>
  <line x1="235" y1="90"  x2="278" y2="100" stroke="#00d4ff" stroke-width="1.1" opacity="0.42"/>
  <line x1="235" y1="90"  x2="285" y2="158" stroke="#2299dd" stroke-width="0.8" opacity="0.20"/>

  <!-- I connections -->
  <line x1="252" y1="140" x2="278" y2="100" stroke="#1199ee" stroke-width="0.9" opacity="0.28"/>
  <line x1="252" y1="140" x2="285" y2="158" stroke="#4477ff" stroke-width="1.0" opacity="0.38"/>
  <line x1="252" y1="140" x2="218" y2="162" stroke="#5566ff" stroke-width="0.8" opacity="0.22"/>

  <!-- J connections -->
  <line x1="218" y1="162" x2="285" y2="158" stroke="#6655ee" stroke-width="1.0" opacity="0.35"/>
  <line x1="218" y1="162" x2="244" y2="220" stroke="#7744ee" stroke-width="0.9" opacity="0.28"/>
  <line x1="218" y1="162" x2="268" y2="212" stroke="#8833ee" stroke-width="0.8" opacity="0.25"/>

  <!-- K connections -->
  <line x1="244" y1="220" x2="268" y2="212" stroke="#8b2af8" stroke-width="1.0" opacity="0.38"/>
  <line x1="244" y1="220" x2="285" y2="158" stroke="#7733dd" stroke-width="0.7" opacity="0.18"/>

  <!-- === Nodes (drawn on top of connections) === -->
  <!-- A -->
  <circle cx="148" cy="95"  r="8.0" fill="#00d4ff" filter="url(#nodeGlow)" opacity="0.92"/>
  <circle cx="148" cy="95"  r="3.8" fill="#e8f8ff"/>
  <!-- B -->
  <circle cx="130" cy="160" r="6.0" fill="#3377ff" filter="url(#nodeGlow)" opacity="0.88"/>
  <circle cx="130" cy="160" r="2.8" fill="#eaf0ff"/>
  <!-- C -->
  <circle cx="158" cy="220" r="7.0" fill="#7733ee" filter="url(#nodeGlow)" opacity="0.90"/>
  <circle cx="158" cy="220" r="3.2" fill="#f0e8ff"/>
  <!-- D -->
  <circle cx="195" cy="68"  r="5.0" fill="#00d4ff" filter="url(#nodeGlow)" opacity="0.85"/>
  <circle cx="195" cy="68"  r="2.3" fill="#e8f8ff"/>
  <!-- E -->
  <circle cx="180" cy="120" r="6.5" fill="#11aaee" filter="url(#nodeGlow)" opacity="0.90"/>
  <circle cx="180" cy="120" r="3.0" fill="#e8f5ff"/>
  <!-- F -->
  <circle cx="165" cy="172" r="5.0" fill="#4466ff" filter="url(#nodeGlow)" opacity="0.86"/>
  <circle cx="165" cy="172" r="2.3" fill="#eaeeff"/>
  <!-- G -->
  <circle cx="210" cy="208" r="5.5" fill="#8822ee" filter="url(#nodeGlow)" opacity="0.88"/>
  <circle cx="210" cy="208" r="2.5" fill="#f0e8ff"/>
  <!-- H -->
  <circle cx="235" cy="90"  r="6.5" fill="#00bbff" filter="url(#nodeGlow)" opacity="0.90"/>
  <circle cx="235" cy="90"  r="3.0" fill="#e8f8ff"/>
  <!-- I -->
  <circle cx="252" cy="140" r="5.0" fill="#3388ff" filter="url(#nodeGlow)" opacity="0.85"/>
  <circle cx="252" cy="140" r="2.3" fill="#eaf0ff"/>
  <!-- J -->
  <circle cx="218" cy="162" r="5.5" fill="#6655ff" filter="url(#nodeGlow)" opacity="0.88"/>
  <circle cx="218" cy="162" r="2.5" fill="#eeeeff"/>
  <!-- K -->
  <circle cx="244" cy="220" r="5.5" fill="#8833ee" filter="url(#nodeGlow)" opacity="0.88"/>
  <circle cx="244" cy="220" r="2.5" fill="#f2e8ff"/>
  <!-- L (output anchor) -->
  <circle cx="278" cy="100" r="7.5" fill="#00d4ff" filter="url(#nodeGlow)" opacity="0.92"/>
  <circle cx="278" cy="100" r="3.5" fill="#e8f8ff"/>
  <!-- M -->
  <circle cx="285" cy="158" r="6.0" fill="#5566ff" filter="url(#nodeGlow)" opacity="0.88"/>
  <circle cx="285" cy="158" r="2.8" fill="#eeeeff"/>
  <!-- N -->
  <circle cx="268" cy="212" r="7.0" fill="#8b2af8" filter="url(#nodeGlow)" opacity="0.92"/>
  <circle cx="268" cy="212" r="3.2" fill="#f2e8ff"/>

  <!-- Company name -->
  <text x="220" y="313"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700"
        text-anchor="middle" letter-spacing="3">
    <tspan fill="#dde8f8">PRIVATE</tspan><tspan fill="#00d4ff">MIND</tspan>
  </text>

  <!-- Tagline -->
  <text x="220" y="333"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="8.5" font-weight="400"
        text-anchor="middle" fill="#4a6a9e" letter-spacing="3.5">SECURE · INTELLIGENT · PRIVATE</text>
</svg>
